<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
    <defs><style>
      .pq-body{transform-origin:7.5px 13px;animation:pq-recoil 1.45s infinite cubic-bezier(.2,.7,.25,1)}
      .pq-shad{transform-origin:7.5px 15.5px;animation:pq-shadow 1.45s infinite ease-out}
      .pq-eye{animation:pq-squint 1.45s infinite;transform-origin:7.5px 9px}
      .pq-rarm{transform-origin:13px 10px;animation:pq-punch 1.45s infinite cubic-bezier(.18,.8,.2,1)}
      .pq-hit{transform-origin:23px 8px;animation:pq-hit 1.45s infinite}
      @keyframes pq-recoil{0%,46%,100%{transform:translateX(0) rotate(0)}58%{transform:translateX(-1.2px) rotate(-5deg)}72%{transform:translateX(.4px) rotate(2deg)}}
      @keyframes pq-shadow{0%,46%,100%{transform:scaleX(1)}58%{transform:scaleX(.9)}}
      @keyframes pq-squint{0%,45%,72%,100%{transform:scaleY(1)}55%,65%{transform:scaleY(.25)}}
      @keyframes pq-punch{0%,42%,100%{transform:translateX(0) scale(1)}55%{transform:translateX(8px) scale(1.28)}70%{transform:translateX(1px)}}
      @keyframes pq-hit{0%,48%,68%,100%{opacity:0;transform:scale(.25) rotate(0)}55%{opacity:1;transform:scale(1.3) rotate(22deg)}}
    </style></defs>
    <polygon class="pq-hit" points="23,3 24.5,6 28,5 26,8 29,10 25,10.5 25,14 22.5,11.5 20,14 20.5,10.5 17,9 20.5,7.5 19,4.5 22,6" fill="#ffd447"></polygon>
    <rect class="pq-shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"></rect>
    <g class="pq-body">
      <g fill="#DE886D"><rect x="3" y="13" width="1" height="2"></rect><rect x="5" y="13" width="1" height="2"></rect><rect x="9" y="13" width="1" height="2"></rect><rect x="11" y="13" width="1" height="2"></rect></g>
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"></rect>
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"></rect>
      <g class="pq-rarm"><rect x="13" y="9" width="2" height="2" fill="#DE886D"></rect><rect x="15" y="8" width="5" height="4" fill="#EF4D4D"></rect><rect x="16" y="6" width="1" height="2" fill="#EF4D4D"></rect><rect x="18" y="6" width="1" height="2" fill="#EF4D4D"></rect><rect x="15" y="12" width="4" height="1" fill="#9E2929"></rect></g>
      <g class="pq-eye" fill="#000"><rect x="4" y="8" width="1.4" height="1"></rect><rect x="9.6" y="8" width="1.4" height="1"></rect></g>
    </g>
  </svg>