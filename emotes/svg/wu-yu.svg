<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
    <defs><style>
      .wy-body{transform-origin:7.5px 13px;animation:wy-sigh 3.4s infinite ease-in-out}
      .wy-shad{transform-origin:7.5px 15.5px;animation:wy-shadow 3.4s infinite}
      .wy-dot{animation:wy-dot 1.8s var(--d,0s) infinite}
      @keyframes wy-sigh{0%,35%,100%{transform:translateY(0)}55%,72%{transform:translateY(.7px)}}
      @keyframes wy-shadow{0%,100%{transform:scaleX(1)}60%{transform:scaleX(1.03)}}
      @keyframes wy-dot{0%,18%,80%,100%{opacity:.25;transform:translateY(0)}38%,62%{opacity:1;transform:translateY(-1px)}}
    </style></defs>
    <g fill="#d5d7df"><rect class="wy-dot" style="--d:0s" x="4" y="1" width="1.3" height="1.3"></rect><rect class="wy-dot" style="--d:-.3s" x="7" y="1" width="1.3" height="1.3"></rect><rect class="wy-dot" style="--d:-.6s" x="10" y="1" width="1.3" height="1.3"></rect></g>
    <rect class="wy-shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"></rect>
    <g class="wy-body">
      <g fill="#DE886D"><rect x="3" y="13" width="1" height="2"></rect><rect x="5" y="13" width="1" height="2"></rect><rect x="9" y="13" width="1" height="2"></rect><rect x="11" y="13" width="1" height="2"></rect></g>
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"></rect><rect x="0" y="10" width="2" height="2" fill="#DE886D"></rect><rect x="13" y="10" width="2" height="2" fill="#DE886D"></rect>
      <g fill="#000"><rect x="3" y="9" width="3" height="1"></rect><rect x="9" y="9" width="3" height="1"></rect></g>
    </g>
  </svg>