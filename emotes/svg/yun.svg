<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
    <defs><style>
      .dy-body{transform-origin:7.5px 13px;animation:dy-sway 1.8s infinite ease-in-out}
      .dy-shad{transform-origin:7.5px 15.5px;animation:dy-shadow 1.8s infinite}
      .dy-orbit{transform-origin:7.5px 2px;animation:dy-orbit 2.2s linear infinite}
      .dy-eye{transform-origin:7.5px 9px;animation:dy-eyes 1.1s linear infinite}
      @keyframes dy-sway{0%,100%{transform:rotate(-7deg) translateY(0)}50%{transform:rotate(7deg) translateY(-.5px)}}
      @keyframes dy-shadow{0%,100%{transform:scaleX(.94)}50%{transform:scaleX(1.04)}}
      @keyframes dy-orbit{to{transform:rotate(360deg)}}
      @keyframes dy-eyes{to{transform:rotate(360deg)}}
    </style></defs>
    <g class="dy-orbit" fill="#ffe06a"><polygon points="7.5,-3 8.3,-1.5 10,-1.3 8.7,0 9.1,1.7 7.5,.8 5.9,1.7 6.3,0 5,-1.3 6.7,-1.5"></polygon><polygon points="15,1 15.7,2.4 17.2,2.6 16.1,3.7 16.4,5.2 15,4.5 13.6,5.2 13.9,3.7 12.8,2.6 14.3,2.4"></polygon><polygon points="0,1 .7,2.4 2.2,2.6 1.1,3.7 1.4,5.2 0,4.5 -1.4,5.2 -1.1,3.7 -2.2,2.6 -.7,2.4"></polygon></g>
    <rect class="dy-shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"></rect>
    <g class="dy-body">
      <g fill="#DE886D"><rect x="3" y="13" width="1" height="2"></rect><rect x="5" y="13" width="1" height="2"></rect><rect x="9" y="13" width="1" height="2"></rect><rect x="11" y="13" width="1" height="2"></rect></g>
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"></rect><rect x="0" y="10" width="2" height="2" fill="#DE886D"></rect><rect x="13" y="10" width="2" height="2" fill="#DE886D"></rect>
      <g class="dy-eye" fill="none" stroke="#000" stroke-width=".65"><path d="M3.6 8.8 q1.2-1.6 2.4 0 q-1.2 1.6-2.4 0"></path><path d="M9 8.8 q1.2-1.6 2.4 0 q-1.2 1.6-2.4 0"></path></g>
    </g>
  </svg>