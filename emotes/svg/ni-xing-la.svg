<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
    <defs><style>
      .xl-body{transform-origin:7.5px 13px;animation:xl-lean 2.8s infinite ease-in-out}
      .xl-shad{transform-origin:7.5px 15.5px;animation:xl-shadow 2.8s infinite}
      .xl-rarm{transform-origin:13px 10px;animation:xl-wave 1.1s infinite ease-in-out}
      .xl-sun{transform-origin:7.5px -3px;animation:xl-sun 2.8s infinite ease-in-out}
      .xl-eye{transform-origin:7.5px 9px;animation:xl-blink 3.1s infinite}
      @keyframes xl-lean{0%,100%{transform:rotate(0) translateY(0)}45%,65%{transform:rotate(-4deg) translateY(-.6px)}}
      @keyframes xl-shadow{0%,100%{transform:scaleX(1)}55%{transform:scaleX(.95)}}
      @keyframes xl-wave{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-52deg)}}
      @keyframes xl-sun{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes xl-blink{0%,44%,56%,100%{transform:scaleY(1)}49%,52%{transform:scaleY(.12)}}
    </style></defs>
    <g class="xl-sun" fill="#FFD447"><rect x="5" y="-5" width="5" height="5"></rect><rect x="7" y="-8" width="1" height="2"></rect><rect x="7" y="1" width="1" height="2"></rect><rect x="2" y="-3" width="2" height="1"></rect><rect x="11" y="-3" width="2" height="1"></rect></g>
    <rect class="xl-shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"></rect>
    <g class="xl-body">
      <g fill="#DE886D"><rect x="3" y="13" width="1" height="2"></rect><rect x="5" y="13" width="1" height="2"></rect><rect x="9" y="13" width="1" height="2"></rect><rect x="11" y="13" width="1" height="2"></rect></g>
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"></rect><rect x="0" y="9" width="2" height="2" fill="#DE886D"></rect>
      <g class="xl-rarm"><rect x="13" y="9" width="2" height="2" fill="#DE886D"></rect></g>
      <g class="xl-eye" fill="#000"><rect x="4" y="8" width="1" height="2"></rect><rect x="10" y="8" width="1" height="2"></rect></g>
      <rect x="2" y="5" width="11" height="1" fill="#B9D4FF"></rect><path d="M3 5V3H5V2H10V3H12V5Z" fill="#7394CF"></path><rect x="12" y="3" width="2" height="2" fill="#DBE7FF"></rect>
    </g>
  </svg>