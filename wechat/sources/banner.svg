  </defs>

  <!-- Lively, non-white backdrop -->
  <rect width="750" height="400" fill="url(#bg)"/>
  <circle cx="72" cy="64" r="92" fill="#7FE4D5" opacity=".72"/>
  <circle cx="686" cy="52" r="112" fill="#A780EA" opacity=".55"/>
  <circle cx="370" cy="-24" r="96" fill="#F6D872" opacity=".35"/>
  <path d="M0 258 Q120 218 238 260 T475 258 T750 247 V400 H0Z" fill="#4C4AA8" opacity=".48"/>

  <!-- Sun and cheerful confetti shapes; no text -->
  <circle cx="79" cy="75" r="28" fill="#FFE36E"/>
  <g fill="#FFF3A6">
    <rect x="76" y="25" width="6" height="16"/>
    <rect x="76" y="109" width="6" height="16"/>
    <rect x="29" y="72" width="16" height="6"/>
    <rect x="113" y="72" width="16" height="6"/>
  </g>
  <g fill="#FFE36E">
