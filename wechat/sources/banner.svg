<svg xmlns="http://www.w3.org/2000/svg" width="750" height="400" viewBox="0 0 750 400" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45C8D6"/>
      <stop offset="1" stop-color="#6669D8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD96A"/>
      <stop offset="1" stop-color="#F6A85B"/>
