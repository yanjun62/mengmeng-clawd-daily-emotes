    <rect x="7" y="4" width="4" height="12" fill="#FFF2CF" opacity=".75"/>
    <rect x="18" y="0" width="4" height="14" fill="#FFF2CF" opacity=".55"/>
  </g>
  <g transform="translate(442 234)">
    <rect x="7" y="31" width="38" height="30" rx="5" fill="#F17C75"/>
    <rect x="25" y="9" width="5" height="28" fill="#437D68"/>
    <path d="M27 22 C3 17 1 2 22 7 C21 -2 42 -3 32 23Z" fill="#5DBB7A"/>
