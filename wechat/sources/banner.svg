  <g fill="#FF6F92">
    <path d="M663 155 C663 143 681 143 681 155 C681 143 699 143 699 155 C699 170 681 181 681 181 C681 181 663 170 663 155Z"/>
    <path d="M536 172 C536 165 547 165 547 172 C547 165 558 165 558 172 C558 181 547 188 547 188 C547 188 536 181 536 172Z" opacity=".75"/>
  </g>
